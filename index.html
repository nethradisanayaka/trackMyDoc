<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocTrack | Service-Oriented Document Management System</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Separate Stylesheets -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="styles/dashboard.css">
    <link rel="stylesheet" href="styles/documents.css">
    <link rel="stylesheet" href="styles/tracking.css">
    <link rel="stylesheet" href="styles/analytics.css">
</head>
<body>
    <div id="app-container" class="authenticated-layout hidden">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-logo">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div class="brand-info">
                    <h1>DocTrack</h1>
                    <span>SOC Platform v1.0</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" id="nav-dashboard">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#documents" class="nav-item" id="nav-documents">
                    <i class="fa-solid fa-folder-open"></i>
                    <span>Documents</span>
                </a>
                <a href="#tracking" class="nav-item" id="nav-tracking">
                    <i class="fa-solid fa-qrcode"></i>
                    <span>Scanner & Track</span>
                </a>
                <a href="#analytics" class="nav-item" id="nav-analytics">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Analytics</span>
                </a>
                <a href="#notifications" class="nav-item" id="nav-notifications">
                    <i class="fa-solid fa-bell"></i>
                    <span>Notifications</span>
                    <span class="notification-badge hidden" id="nav-notif-count">0</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="header-avatar">U</div>
                    <div class="user-info">
                        <span class="user-name" id="profile-name">Loading...</span>
                        <span class="user-role" id="profile-role">Officer</span>
                    </div>
                </div>
                <button class="logout-btn" id="btn-logout" title="Log Out">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <header class="main-header">
                <div class="header-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="global-search" placeholder="Search documents by ID, QR, title...">
                </div>
                <div class="header-actions">
                    <!-- Configurable Domain Selector Badge -->
                    <div class="domain-selector-badge" id="domain-badge">
                        <i class="fa-solid fa-building"></i>
                        <span id="active-domain-name">University System</span>
                    </div>
                    
                    <button class="header-btn" id="btn-quick-create" title="Create New Document">
                        <i class="fa-solid fa-plus"></i>
                        <span>New Doc</span>
                    </button>
                    
                    <button class="header-btn" id="btn-trigger-notif" title="Notifications">
                        <i class="fa-solid fa-bell"></i>
                        <span class="dot-badge hidden" id="header-notif-dot"></span>
                    </button>
                </div>
            </header>

            <!-- View Viewport -->
            <main class="content-viewport" id="app-viewport">
                <!-- Dynamically rendered templates inject here -->
            </main>
        </div>
    </div>

    <!-- Auth View Container -->
    <div id="auth-container" class="auth-layout">
        <!-- Injected Auth Component (Login / Registration) -->
    </div>

    <!-- Dynamic Custom Toast Alerts -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Application Core & Components -->
    <script src="js/utils/mock-data.js"></script>
    <script src="js/utils/qr-generator.js"></script>
    <script src="js/store.js"></script>
    <script src="js/components/auth.js"></script>
    <script src="js/components/dashboard.js"></script>
    <script src="js/components/document-manager.js"></script>
    <script src="js/components/tracking.js"></script>
    <script src="js/components/notifications.js"></script>
    <script src="js/components/analytics.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
